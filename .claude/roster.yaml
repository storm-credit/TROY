  tech:
    lead:
      name: tech-team-lead
      file: .claude/teams/tech/team_lead.md
      default_model: claude-sonnet
    specialists:
      - name: backend-engineer
        file: .claude/teams/tech/backend-engineer.md
        hiring: permanent
        default_model: claude-sonnet
      - name: frontend-engineer
        file: .claude/teams/tech/frontend-engineer.md
        hiring: permanent
        default_model: claude-sonnet
      - name: devops
        file: .claude/teams/tech/devops.md
