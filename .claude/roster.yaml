# TROY — Organization Roster
# (이식 원본: ODD ENGINE roster v3 / TROY-adapted v1)
# Orchestra 3-tier hierarchy (L1 Conductor → L2 Team Leads → L3 Specialists)
#
# TROY 컨텍스트:
#   - 작품: 「너라는 운율」 (You are the Rhyme), 120화 시리얼 + 화당 1곡 + 화당 1 MV 패킷
#   - 캐논 위치: canon/{series,world,characters,style,motif_ledger,canon_lock_matrix,open_questions}.md
#   - 엔진 문서: ops/orchestra_engine.md, music_engine.md, image_engine.md, video_engine.md, troy_engine_method.md
#   - 미디어 라우팅: export/media_modules/09_MODULE_ROUTING_BOARD.md
#
# 트랙 ID 체계 (oddengine KR-01~10 → TROY E### 에피소드 번호):
#   1.  E054 — 밝은 창              (title-track candidate, pilot)
#   2.  E113 — 나를 잃지 않는 일    (selfhood declaration, pilot)
#   3.  E050 — 접힌 문장            (private diary, pilot)
#   4.  E011 — 남은 소리            (debut spark, second pass)
#   5.  E030 — 천천히 열어 둔 문    (careful yes, second pass)
#   6.  E118 — 같은 말을 하던 저녁  (dignified parting, second pass)
#   7.  E014 — 이름 없는 노래       (shy conversation, third pass)
#   8.  E022 — 없는 시간에도        (voice-memory, third pass)
#   9.  E034 — 유리 뒤의 여름       (withdrawal, third pass)
#   10. E064 — 흔들리는 운율        (pre-loss instability, fourth pass)
#   11. E094 — 끝까지 들은 말       (correction/asking, fourth pass)
#   12. E108 — 정상인 불안          (livable uncertainty, fourth pass)
#   진행 보드: export/music/arin_album_vol1_master_generation_board.md
#
# 캐릭터 매핑 (oddengine 한국 귀신 크루 → TROY 인물):
#   주연:   윤서준 (수신자, 공감각, 22세, 경영학)
#           지아린 (발신자, 보컬, 21세, 국문학)
#   조연:   최이든 (룸메이트), 강도현 (연적), 송유빈 (16세 첫사랑/트라우마),
#           배소나 (아린 현실거울), 이태율 (Phase 5-6 윤리적 거울)
#   상세:   canon/characters.md
#
# Model routing 참고: oddengine briefs/system/MODEL_ROUTING_MATRIX.md (TROY 자체 라우팅 매트릭스 작성 전까지 참조)

version: 3
updated: 2026-04-28
project: TROY
source_repo: ODD ENGINE

levels:
  L1: "Conductor — 전체 지휘, 최종 승인"
  L2: "Team Lead — 팀 운영, 하위 전문가 분배, 크로스팀 협업"
  L3: "Specialist — 실제 작업 수행"

# ──────────────────────────────────────────────────
# L1: CONDUCTOR
# ──────────────────────────────────────────────────
conductor:
  name: orchestra
  file: .claude/commands/orchestra.md
  responsibilities:
    - 트랙 전체 흐름 총괄
    - 팀장 간 충돌 조정
    - 최종 출시 승인
    - 우선순위 재배정

# ──────────────────────────────────────────────────
# L2 + L3: TEAMS
# ──────────────────────────────────────────────────
teams:

  creative:
    lead:
      name: creative-team-lead
      file: .claude/teams/creative/team_lead.md
      default_model: claude-opus
    specialists:
      - name: story-director
        file: .claude/teams/creative/story-director.md
        hiring: permanent
        default_model: claude-opus
      - name: lyrics-director
