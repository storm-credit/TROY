# ──────────────────────────────────────────────────
# SUMMARY
# ──────────────────────────────────────────────────
summary:
  total_team_leads: 5
  permanent_specialists: 17          # 13 + 4 new (prompt-curator, subtitle-translator, clip-matcher, manifest-validator)
  on_demand_specialists: 3
  grand_total_including_conductor: 26
  default_model_note: "각 에이전트의 default_model 필드 참조. 세부는 briefs/system/MODEL_ROUTING_MATRIX.md"

# ──────────────────────────────────────────────────
# CROSS-TEAM COLLABORATION RULES
# ──────────────────────────────────────────────────
collaboration:
  direct:
    - creative ↔ visual: "콘티 → 프롬프트 전환 협의"
    - visual ↔ tech: "aspect_ratio·폴더 규칙, Vertex 호환성"
    - creative ↔ production: "컷 길이 조정, 사운드 싱크"
    - visual ↔ production: "썸네일 후보 프레임"
    - tech ↔ production: "렌더링 사양·배포 환경"
    - "* → qa": "리뷰 요청 (필요시)"

  escalation:
    - "팀장 간 충돌 발생 시 orchestra(L1)에 에스컬레이션"
    - "최종 출시 승인은 orchestra 전용"

# ──────────────────────────────────────────────────
# VERTEX / DOCKER DEPENDENCY POLICY (TROY-adapted)
# ──────────────────────────────────────────────────
# TROY 는 ODD ENGINE의 Docker/FastAPI/Vertex AI 백엔드를 사용하지 않는다.
# 본 roster의 default_model 필드 중 `gemini-*-vertex` 라고 적힌 6 라인은
# 사용자가 ★시작 전 직접 교체★ 한다 (Anthropic SDK / Direct Gemini API / OpenAI 등 자유 선택).
#
# 영향 라인 (자동 갱신 시 주의):
#   L94  character-designer  : gemini-2.5-pro-vertex      ← USER REPLACE
#   L98  art-director        : gemini-2.5-pro-vertex      ← USER REPLACE
#   L102 motion-director     : gemini-2.5-flash-vertex    ← USER REPLACE
#   L106 prompt-engineer     : gemini-2.5-flash-vertex    ← USER REPLACE
#   L110 prompt-curator      : gemini-2.5-flash-vertex    ← USER REPLACE
#   L171 visual-qa           : gemini-2.5-pro-vertex      ← USER REPLACE
# (라인 번호는 본 헤더 추가로 +N 시프트 가능 — 정확한 매칭은 `default_model: gemini-` 패턴 검색)
#
# Docker/SA-key/FastAPI 점검 항목 (TROY 무관, 휴면 처리):
#   - .claude/teams/tech/backend-engineer.md   (FastAPI/Vertex 백엔드)        → SUSPENDED
#   - .claude/teams/tech/devops.md             (Docker/SA 키 로테이션)        → SUSPENDED
#   - .claude/commands/orchestra-audit.md:42   (docker exec ... )             → SUSPENDED
#   - .claude/commands/orchestra.md:61         (Vertex .env/vertex-sa-key)    → SUSPENDED
#   - .claude/commands/tech-director.md:32     (vertex-sa-key gitignore)      → 새 tech/team_lead.md 로 대체됨
#   - .claude/teams/qa/security.md:14,19       (Vertex SA 키 보안)            → SUSPENDED
#   - .claude/commands/producer.md:15          ("Vertex 일일 쿼터")           → "외부 생성 도구 크레딧"으로 일반화 해석
#   - .claude/teams/production/producer.md:15  (위와 동일)                    → 동일 해석
#   - .claude/teams/production/team_lead.md:17 (Vertex 쿼터 예산)             → 동일 해석
#
# 위 SUSPENDED 항목은 호출 시 Conductor 가 "TROY 무관 → SKIP" 으로 판정 (CLAUDE.md §11 참조).

# ──────────────────────────────────────────────────
# HIRING DECISION
# ──────────────────────────────────────────────────
hiring_notes:
  permanent_reason: "트랙마다 반드시 호출되는 역할. 일관성 유지 위해 고정."
  on_demand_reason: "특정 상황에만 필요. 호출 오버헤드 절감."
  promotion_to_permanent:
    trigger: "on-demand 전문가가 한 트랙 내 3회 이상 호출되면 permanent 승격 검토"
